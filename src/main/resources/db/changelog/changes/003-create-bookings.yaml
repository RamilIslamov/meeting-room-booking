databaseChangeLog:
  - changeSet:
      id: 003-create-bookings
      author: ramil
      changes:
        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_bookings
                    nullable: false
              - column:
                  name: room_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bookings_room
                    references: rooms(id)
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bookings_user
                    references: users(id)
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: cancelled_at
                  type: timestamp with time zone
        - createIndex:
            tableName: bookings
            indexName: idx_bookings_room_time
            columns:
              - column:
                  name: room_id
              - column:
                  name: start_time
              - column:
                  name: end_time
        - createIndex:
            tableName: bookings
            indexName: idx_bookings_user
            columns:
              - column:
                  name: user_id
